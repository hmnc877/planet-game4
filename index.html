<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宇宙クイズ</title>
<style>

:root {
  --bg: #04050f;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --purple: #7c3aed;
  --cyan: #06b6d4;
  --gold: #f59e0b;
  --text: #1a1a2e;
  --muted: #3a4a7a;
  --correct: #10b981;
  --wrong: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Yu Gothic", system-ui, sans-serif;
  min-height: 100dvh;
  overflow-x: hidden;
  position: relative;
}
ruby { ruby-align: center; }
rt { font-size: 0.55em; color: #3a4a7a; }

#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle linear infinite; }
@keyframes twinkle { 0%,100%{opacity:0.1} 50%{opacity:1} }
.nebula { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
.nebula-1 { width:400px;height:400px;background:rgba(124,58,237,0.12);top:-100px;right:-100px; }
.nebula-2 { width:350px;height:350px;background:rgba(6,182,212,0.08);bottom:-100px;left:-100px; }

#app {
  position: relative; z-index: 1;
  min-height: 100dvh;
  display: flex; align-items: center; justify-content: center;
  padding: 1.5rem 1rem;
}
.screen { width: 100%; max-width: 520px; }

/* タイトル */
#title-screen { text-align: center; }
.logo {
  font-size: clamp(2rem,8vw,3.5rem); font-weight:700; letter-spacing:-0.02em; line-height:1.1; margin-bottom:0.5rem;
  background: linear-gradient(135deg,#a78bfa,#06b6d4);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
}
.logo-sub { font-size:clamp(0.85rem,3vw,1rem); color:#3a4a7a; margin-bottom:3rem; letter-spacing:0.15em; text-transform:uppercase; }
.planet-system { width:160px;height:160px;margin:0 auto 3rem;position:relative; }
.sun {
  width:52px;height:52px;
  background:radial-gradient(circle at 35% 35%,#fde68a,#f59e0b,#b45309);
  border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  box-shadow:0 0 20px rgba(245,158,11,0.6),0 0 40px rgba(245,158,11,0.3);
}
.orbit { position:absolute;top:50%;left:50%;border-radius:50%;border:1px solid rgba(255,255,255,0.1);transform-origin:center;transform:translate(-50%,-50%); }
.orbit-1{width:90px;height:90px;animation:orbit 4s linear infinite;}
.orbit-2{width:140px;height:140px;animation:orbit 8s linear infinite reverse;}
.orbit-3{width:110px;height:110px;animation:orbit 6s linear infinite;}
@keyframes orbit{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.planet-dot{position:absolute;border-radius:50%;top:0;left:50%;transform:translateX(-50%) translateY(-50%);}
.planet-dot-1{width:10px;height:10px;background:radial-gradient(#93c5fd,#3b82f6);box-shadow:0 0 8px rgba(59,130,246,0.8);}
.planet-dot-2{width:14px;height:14px;background:radial-gradient(#fca5a5,#ef4444);box-shadow:0 0 8px rgba(239,68,68,0.6);}
.planet-dot-3{width:8px;height:8px;background:radial-gradient(#d9f99d,#84cc16);box-shadow:0 0 6px rgba(132,204,22,0.8);}

.difficulty-title { font-size:0.8rem;color:#3a4a7a;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:1rem; }
.diff-cards { display:flex;flex-direction:column;gap:10px; }
.diff-card {
  background:var(--surface);border:1px solid var(--border);border-radius:14px;
  padding:1.1rem 1.4rem;cursor:pointer;text-align:left;
  display:flex;align-items:center;gap:1rem;
  transition:border-color 0.2s,background 0.2s,transform 0.15s;width:100%;
}
.diff-card:hover{background:rgba(255,255,255,0.07);transform:translateY(-1px);}
.diff-card:active{transform:translateY(0);}
.diff-icon{font-size:1.8rem;flex-shrink:0;}
.diff-info{flex:1;}
.diff-name{font-size:1rem;font-weight:700;margin-bottom:2px;}
.diff-desc{font-size:0.78rem;color:#3a4a7a;}
.diff-badge{font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.05em;flex-shrink:0;}
.diff-card.easy{border-color:rgba(16,185,129,0.25);}
.diff-card.easy:hover{border-color:rgba(16,185,129,0.5);}
.diff-card.easy .diff-name{color:#059669;}
.diff-card.easy .diff-badge{background:rgba(16,185,129,0.15);color:#059669;border:1px solid rgba(16,185,129,0.3);}
.diff-card.normal{border-color:rgba(6,182,212,0.25);}
.diff-card.normal:hover{border-color:rgba(6,182,212,0.5);}
.diff-card.normal .diff-name{color:#0891b2;}
.diff-card.normal .diff-badge{background:rgba(6,182,212,0.15);color:#0891b2;border:1px solid rgba(6,182,212,0.3);}
.diff-card.hard{border-color:rgba(124,58,237,0.3);}
.diff-card.hard:hover{border-color:rgba(124,58,237,0.6);}
.diff-card.hard .diff-name{color:#7c3aed;}
.diff-card.hard .diff-badge{background:rgba(124,58,237,0.15);color:#7c3aed;border:1px solid rgba(124,58,237,0.3);}

/* クイズ */
#quiz-screen{display:none;}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.q-info{font-size:0.8rem;color:#3a4a7a;}
.q-score{font-size:0.85rem;font-weight:700;color:#b45309;display:flex;align-items:center;gap:4px;}
.progress-bar-wrap{height:3px;background:rgba(0,0,0,0.08);border-radius:2px;margin-bottom:1.5rem;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan));border-radius:2px;transition:width 0.4s ease;}
.time-bar-wrap{height:3px;background:rgba(0,0,0,0.08);border-radius:2px;margin-bottom:1rem;overflow:hidden;display:none;}
.time-bar-fill{height:100%;background:linear-gradient(90deg,#ef4444,#f59e0b);border-radius:2px;transition:width 0.1s linear;}
.category-tag{display:inline-flex;align-items:center;gap:5px;font-size:0.72rem;color:#3a4a7a;background:rgba(0,0,0,0.04);border:1px solid rgba(0,0,0,0.1);border-radius:20px;padding:3px 10px;margin-bottom:1rem;letter-spacing:0.08em;text-transform:uppercase;}
.question-text{font-size:clamp(1rem,4vw,1.2rem);font-weight:700;line-height:1.8;margin-bottom:1.5rem;min-height:3em;color:#1a1a2e;}
.choices{display:flex;flex-direction:column;gap:8px;margin-bottom:1rem;}
.choice-btn {
  background:rgba(124,58,237,0.05);border:1px solid rgba(26,26,46,0.2);border-radius:12px;
  padding:0.9rem 1.1rem;color:#1a1a2e;font-size:0.9rem;font-family:inherit;
  text-align:left;cursor:pointer;
  transition:background 0.15s,border-color 0.15s,transform 0.1s;
  display:flex;align-items:center;gap:0.75rem;line-height:1.6;
}
.choice-btn:hover:not(:disabled){background:rgba(124,58,237,0.1);border-color:rgba(124,58,237,0.4);transform:translateX(3px);}
.choice-btn:disabled{cursor:default;transform:none;}
.choice-label{width:22px;height:22px;border-radius:6px;background:rgba(124,58,237,0.12);border:1px solid rgba(124,58,237,0.3);display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:700;flex-shrink:0;color:#7c3aed;}
.choice-btn.correct{background:rgba(16,185,129,0.12);border-color:rgba(16,185,129,0.5);}
.choice-btn.correct .choice-label{background:rgba(16,185,129,0.3);border-color:var(--correct);color:var(--correct);}
.choice-btn.wrong{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.4);}
.choice-btn.wrong .choice-label{background:rgba(239,68,68,0.2);border-color:var(--wrong);color:var(--wrong);}
.choice-btn.reveal{background:rgba(6,182,212,0.08);border-color:rgba(6,182,212,0.3);}
.choice-btn.reveal .choice-label{background:rgba(6,182,212,0.2);border-color:var(--cyan);color:var(--cyan);}
.choice-btn ruby rt{font-size:0.5em;color:#3a4a7a;}
.choice-btn.correct ruby rt{color:#059669;}
.choice-btn.wrong ruby rt{color:#b91c1c;}
.choice-btn.reveal ruby rt{color:#0891b2;}
.feedback-box{border-radius:12px;padding:0.85rem 1rem;font-size:0.85rem;line-height:1.6;margin-bottom:1rem;border:1px solid rgba(26,26,46,0.15);background:rgba(124,58,237,0.05);color:#3a4a7a;min-height:52px;display:flex;align-items:center;gap:8px;}
.feedback-box.correct{background:rgba(16,185,129,0.08);border-color:rgba(16,185,129,0.3);color:#065f46;}
.feedback-box.wrong{background:rgba(239,68,68,0.08);border-color:rgba(239,68,68,0.3);color:#991b1b;}
.next-btn{width:100%;padding:0.9rem;background:linear-gradient(135deg,var(--purple),#4f46e5);border:none;border-radius:12px;color:white;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.2s,transform 0.1s;letter-spacing:0.03em;}
.next-btn:hover:not(:disabled){opacity:0.9;transform:translateY(-1px);}
.next-btn:disabled{opacity:0.3;cursor:default;transform:none;}

/* 結果 */
#result-screen{display:none;text-align:center;}
.result-icon{font-size:3.5rem;margin-bottom:0.5rem;}
.result-rank{font-size:clamp(1rem,4vw,1.3rem);font-weight:700;margin-bottom:0.25rem;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.result-score-big{font-size:clamp(3rem,12vw,5rem);font-weight:700;line-height:1;color:#1a1a2e;margin-bottom:0.25rem;}
.result-score-label{font-size:0.85rem;color:#3a4a7a;margin-bottom:2rem;}
.result-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:2rem;}
.stat-box{background:rgba(124,58,237,0.05);border:1px solid rgba(26,26,46,0.1);border-radius:12px;padding:0.75rem 0.5rem;}
.stat-val{font-size:1.2rem;font-weight:700;color:#1a1a2e;}
.stat-lbl{font-size:0.68rem;color:#3a4a7a;margin-top:2px;}
.result-btns{display:flex;flex-direction:column;gap:8px;}
.btn-primary{padding:0.9rem;background:linear-gradient(135deg,var(--purple),#4f46e5);border:none;border-radius:12px;color:white;font-size:0.95rem;font-weight:700;font-family:inherit;cursor:pointer;transition:opacity 0.2s;}
.btn-primary:hover{opacity:0.9;}
.btn-secondary{padding:0.85rem;background:rgba(124,58,237,0.05);border:1px solid rgba(26,26,46,0.15);border-radius:12px;color:#3a4a7a;font-size:0.9rem;font-family:inherit;cursor:pointer;transition:background 0.15s;}
.btn-secondary:hover{background:rgba(124,58,237,0.1);}
</style>
</head>
<body>
<div id="stars"></div>
<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>

<div id="app">
  <!-- タイトル画面 -->
  <div class="screen" id="title-screen">
    <div class="planet-system">
      <div class="sun"></div>
      <div class="orbit orbit-1"><div class="planet-dot planet-dot-1"></div></div>
      <div class="orbit orbit-2"><div class="planet-dot planet-dot-2"></div></div>
      <div class="orbit orbit-3"><div class="planet-dot planet-dot-3"></div></div>
    </div>
    <div class="logo">宇宙クイズ</div>
    <div class="logo-sub"><ruby>惑星<rt>わくせい</rt></ruby>・<ruby>星<rt>ほし</rt></ruby>・<ruby>宇宙<rt>うちゅう</rt></ruby>の<ruby>謎<rt>なぞ</rt></ruby>に<ruby>挑<rt>いど</rt></ruby>め</div>
    <div class="difficulty-title"><ruby>難易度<rt>なんいど</rt></ruby>を<ruby>選<rt>えら</rt></ruby>んでください</div>
    <div class="diff-cards">
      <button class="diff-card easy" data-diff="easy">
        <span class="diff-icon">🌍</span>
        <div class="diff-info">
          <div class="diff-name">かんたん</div>
          <div class="diff-desc"><ruby>太陽系<rt>たいようけい</rt></ruby>の<ruby>基礎<rt>きそ</rt></ruby>・<ruby>有名<rt>ゆうめい</rt></ruby>な<ruby>星<rt>ほし</rt></ruby>・<ruby>宇宙<rt>うちゅう</rt></ruby>の<ruby>常識<rt>じょうしき</rt></ruby> ／ ４<ruby>択<rt>たく</rt></ruby> ／ 10<ruby>問<rt>もん</rt></ruby></div>
        </div>
        <span class="diff-badge">EASY</span>
      </button>
      <button class="diff-card normal" data-diff="normal">
        <span class="diff-icon">🪐</span>
        <div class="diff-info">
          <div class="diff-name">ふつう</div>
          <div class="diff-desc"><ruby>惑星<rt>わくせい</rt></ruby>・<ruby>星座<rt>せいざ</rt></ruby>・<ruby>宇宙探査<rt>うちゅうたんさ</rt></ruby> ／ ４<ruby>択<rt>たく</rt></ruby> ／ 15<ruby>問<rt>もん</rt></ruby></div>
        </div>
        <span class="diff-badge">NORMAL</span>
      </button>
      <button class="diff-card hard" data-diff="hard">
        <span class="diff-icon">🌌</span>
        <div class="diff-info">
          <div class="diff-name">むずかしい</div>
          <div class="diff-desc"><ruby>恒星<rt>こうせい</rt></ruby>・<ruby>銀河<rt>ぎんが</rt></ruby>・<ruby>宇宙論<rt>うちゅうろん</rt></ruby> ／ ４<ruby>択<rt>たく</rt></ruby>＋<ruby>制限時間<rt>せいげんじかん</rt></ruby> ／ 20<ruby>問<rt>もん</rt></ruby></div>
        </div>
        <span class="diff-badge">HARD</span>
      </button>
    </div>
  </div>

  <!-- クイズ画面 -->
  <div class="screen" id="quiz-screen">
    <div class="quiz-header">
      <div class="q-info" id="q-info"></div>
      <div class="q-score">⭐ <span id="q-score">0</span></div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill"></div></div>
    <div class="time-bar-wrap" id="time-bar-wrap"><div class="time-bar-fill" id="time-bar-fill"></div></div>
    <div class="category-tag" id="category-tag"></div>
    <div class="question-text" id="question-text"></div>
    <div class="choices" id="choices"></div>
    <div class="feedback-box" id="feedback-box"><ruby>答<rt>こた</rt></ruby>えを<ruby>選<rt>えら</rt></ruby>んでください</div>
    <button class="next-btn" id="next-btn" disabled></button>
  </div>

  <!-- 結果画面 -->
  <div class="screen" id="result-screen">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-rank" id="result-rank"></div>
    <div class="result-score-big" id="result-score-big"></div>
    <div class="result-score-label" id="result-score-label"></div>
    <div class="result-stats">
      <div class="stat-box"><div class="stat-val" id="stat-correct"></div><div class="stat-lbl"><ruby>正解<rt>せいかい</rt></ruby></div></div>
      <div class="stat-box"><div class="stat-val" id="stat-streak"></div><div class="stat-lbl"><ruby>最高連続<rt>さいこうれんぞく</rt></ruby></div></div>
      <div class="stat-box"><div class="stat-val" id="stat-acc"></div><div class="stat-lbl"><ruby>正解率<rt>せいかいりつ</rt></ruby></div></div>
    </div>
    <div class="result-btns">
      <button class="btn-primary" id="retry-btn"><ruby>同<rt>おな</rt></ruby>じ<ruby>難易度<rt>なんいど</rt></ruby>でもう一度</button>
      <button class="btn-secondary" id="title-btn"><ruby>難易度<rt>なんいど</rt></ruby>を<ruby>変<rt>か</rt></ruby>える</button>
    </div>
  </div>
</div>

<script>
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.5+0.5;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${-Math.random()*4}s;`;
    c.appendChild(s);
  }
})();

// ルビ付きHTML文字列を返すヘルパー

    {cat:"🌙 "+r("月","つき"),
     q:r("月","つき")+"が"+r("地球","ちきゅう")+"を１"+r("周","しゅう")+"するのにかかる"+r("時間","じかん")+"は"+r("約","やく")+"？",
     a:r("約","やく")+"27"+r("日","にち"),w:[r("約","やく")+"7"+r("日","にち"),r("約","やく")+"365"+r("日","にち"),r("約","やく")+"90"+r("日","にち")]},
    {cat:"🚀 "+r("宇宙探査","うちゅうたんさ"),

    {cat:"🌌 "+r("宇宙","うちゅう"),
     q:r("光","ひかり")+"が１"+r("年間","ねんかん")+"に"+r("進","すす")+"む"+r("距離","きょり")+"を"+r("何","なん")+"という？",
     a:r("光年","こうねん"),w:[r("天文単位","てんもんたんい"),"パーセク",r("光速","こうそく")]},
    {cat:"🪐 "+r("惑星","わくせい"),
     q:r("太陽系","たいようけい")+"で"+r("最","もっと")+"も"+r("小","ちい")+"さい"+r("惑星","わくせい")+"は？",

let currentDiff='',questions=[],current=0,score=0,streak=0,bestStreak=0,answered=false;
let timerInterval=null,timeLeft=0;
const TIME_LIMIT=20;

function shuffle(a){return[...a].sort(()=>Math.random()-0.5)}

function startGame(diff){
  currentDiff=diff;
  const counts={easy:15,normal:15,hard:20};
  questions=shuffle(ALL_QUESTIONS[diff]).slice(0,counts[diff]);
  current=0;score=0;streak=0;bestStreak=0;answered=false;
  document.getElementById('title-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='block';
  document.getElementById('time-bar-wrap').style.display=diff==='hard'?'block':'none';
  renderQuestion();
}

function renderQuestion(){
  answered=false;
  clearInterval(timerInterval);
  const q=questions[current];
  const total=questions.length;
  const labels=['A','B','C','D'];
  document.getElementById('q-info').innerHTML=`<ruby>問<rt>もん</rt></ruby> ${current+1} / ${total}`;
  document.getElementById('q-score').textContent=score;
  document.getElementById('progress-fill').style.width=`${(current/total)*100}%`;
  document.getElementById('category-tag').innerHTML=q.cat;
  document.getElementById('question-text').innerHTML=q.q;
  document.getElementById('feedback-box').innerHTML=`<ruby>答<rt>こた</rt></ruby>えを<ruby>選<rt>えら</rt></ruby>んでください`;
  document.getElementById('feedback-box').className='feedback-box';
  document.getElementById('next-btn').disabled=true;
  document.getElementById('next-btn').innerHTML=current+1<total?`<ruby>次<rt>つぎ</rt></ruby>の<ruby>問題<rt>もんだい</rt></ruby> →`:`<ruby>結果<rt>けっか</rt></ruby>を<ruby>見<rt>み</rt></ruby>る 🚀`;

  const choices=shuffle([q.a,...q.w]);
  const correctIdx2=choices.indexOf(q.a);
  document.getElementById('choices').innerHTML=choices.map((c,i)=>`
    <button class="choice-btn" data-choice="${i}" data-correct="${correctIdx2}">
      <span class="choice-label">${labels[i]}</span><span>${c}</span>
    </button>
  `).join('');

  if(currentDiff==='hard'){
    timeLeft=TIME_LIMIT;
    updateTimeBar();
    timerInterval=setInterval(()=>{
      timeLeft-=0.1;
      updateTimeBar();
      if(timeLeft<=0){clearInterval(timerInterval);if(!answered)timeUp();}
    },100);
  }
}

function updateTimeBar(){
  document.getElementById('time-bar-fill').style.width=`${Math.max(0,(timeLeft/TIME_LIMIT)*100)}%`;
}

function timeUp(){
  answered=true;streak=0;
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===correctIdx) b.classList.add('reveal');
  });
  const q=questions[current];
  const fb=document.getElementById('feedback-box');
  fb.className='feedback-box wrong';
  fb.innerHTML=`⏰ <ruby>時間切<rt>じかんぎ</rt></ruby>れ！<ruby>正解<rt>せいかい</rt></ruby>は「${q.a}」でした`;
  document.getElementById('next-btn').disabled=false;
}

let correctIdx=-1;
function answer(btn,chosen,correct){
  if(answered)return;
  answered=true;correctIdx=correct;
  clearInterval(timerInterval);
  const isCorrect=chosen===correct;
  document.querySelectorAll('.choice-btn').forEach((b,i)=>{
    b.disabled=true;
    if(i===correct&&!isCorrect)b.classList.add('reveal');
  });
  const fb=document.getElementById('feedback-box');
  if(isCorrect){
    btn.classList.add('correct');
    const bonus=currentDiff==='hard'?Math.ceil(timeLeft/TIME_LIMIT*50)+10:10;
    score+=bonus+streak*2;streak++;bestStreak=Math.max(bestStreak,streak);
    document.getElementById('q-score').textContent=score;
    fb.className='feedback-box correct';
    fb.innerHTML=`✓ <ruby>正解<rt>せいかい</rt></ruby>！${streak>=2?` ${streak}<ruby>連続中<rt>れんぞくちゅう</rt></ruby>！`:''}`;
  }else{
    btn.classList.add('wrong');streak=0;
    fb.className='feedback-box wrong';
    fb.innerHTML=`✗ <ruby>不正解<rt>ふせいかい</rt></ruby>。<ruby>正解<rt>せいかい</rt></ruby>は「${questions[current].a}」でした`;
  }
  document.getElementById('next-btn').disabled=false;
}

function nextQuestion(){current++;if(current>=questions.length){showResult();return;}renderQuestion();}

function showResult(){
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  const total=questions.length;
  const correct=Math.min(total,Math.round(score/(currentDiff==='hard'?60:10)));
  const acc=Math.min(100,Math.round((correct/total)*100));
  let icon,rank;
  if(acc>=90){icon='🏆';rank=r("宇宙","うちゅう")+"の"+r("覇者","はしゃ");}
  else if(acc>=75){icon='🌟';rank=r("星","ほし")+"の"+r("探求者","たんきゅうしゃ");}
  else if(acc>=60){icon='🪐';rank=r("惑星博士","わくせいはかせ");}
  else if(acc>=40){icon='🚀';rank=r("宇宙探索者","うちゅうたんさくしゃ");}
  else{icon='🌍';rank=r("地球人","ちきゅうじん")+r("見習","みなら")+"い";}
  document.getElementById('result-icon').textContent=icon;
  document.getElementById('result-rank').innerHTML=rank;
  document.getElementById('result-score-big').textContent=score;
  document.getElementById('result-score-label').innerHTML=`スコア ／ ${['かんたん','ふつう','むずかしい'][['easy','normal','hard'].indexOf(currentDiff)]}`;
  document.getElementById('stat-correct').textContent=`${correct}/${total}`;
  document.getElementById('stat-streak').innerHTML=`${bestStreak}<ruby>問<rt>もん</rt></ruby>`;
  document.getElementById('stat-acc').textContent=`${acc}%`;
}

function retrySameDiff(){startGame(currentDiff);}
function goTitle(){
  clearInterval(timerInterval);
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='none';
  document.getElementById('title-screen').style.display='block';
}

// ---- イベントリスナー一括登録 ----
document.querySelectorAll('.diff-card').forEach(btn=>{
  btn.addEventListener('click', ()=>startGame(btn.dataset.diff));
});

document.getElementById('next-btn').addEventListener('click', nextQuestion);
document.getElementById('retry-btn').addEventListener('click', retrySameDiff);
document.getElementById('title-btn').addEventListener('click', goTitle);

// 選択肢ボタンは動的生成されるためイベント委任で処理
document.getElementById('choices').addEventListener('click', (e)=>{
  const btn = e.target.closest('.choice-btn');
  if(!btn || btn.disabled) return;
  const chosen = parseInt(btn.dataset.choice, 10);
  const correct = parseInt(btn.dataset.correct, 10);
  answer(btn, chosen, correct);
});
</script>
</body>
</html>
